version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    build: .
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/dbt_project
        airflow db init
        airflow users create -r Admin -u airflow -p airflow -e airflow@example.com -f Airflow -l Admin || true
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./dbt_project:/opt/airflow/dbt_project
      - ./bronze:/opt/airflow/bronze
      - ./snowflake:/opt/airflow/snowflake
      - ./data:/opt/airflow/data

  airflow-webserver:
    build: .
    command: webserver
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_ADMIN_USER: ${SNOWFLAKE_ADMIN_USER}
      SNOWFLAKE_ADMIN_PASSWORD: ${SNOWFLAKE_ADMIN_PASSWORD}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      SNOWFLAKE_SCHEMA_BRONZE: ${SNOWFLAKE_SCHEMA_BRONZE}
      SNOWFLAKE_SCHEMA_SILVER: ${SNOWFLAKE_SCHEMA_SILVER}
      SNOWFLAKE_SCHEMA_GOLD: ${SNOWFLAKE_SCHEMA_GOLD}
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./dbt_project:/opt/airflow/dbt_project
      - ./bronze:/opt/airflow/bronze
      - ./snowflake:/opt/airflow/snowflake
      - ./data:/opt/airflow/data
    restart: always

  airflow-scheduler:
    build: .
    command: scheduler
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_ADMIN_USER: ${SNOWFLAKE_ADMIN_USER}
      SNOWFLAKE_ADMIN_PASSWORD: ${SNOWFLAKE_ADMIN_PASSWORD}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      SNOWFLAKE_SCHEMA_BRONZE: ${SNOWFLAKE_SCHEMA_BRONZE}
      SNOWFLAKE_SCHEMA_SILVER: ${SNOWFLAKE_SCHEMA_SILVER}
      SNOWFLAKE_SCHEMA_GOLD: ${SNOWFLAKE_SCHEMA_GOLD}
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./dbt_project:/opt/airflow/dbt_project
      - ./bronze:/opt/airflow/bronze
      - ./snowflake:/opt/airflow/snowflake
      - ./data:/opt/airflow/data
    restart: always

volumes:
  postgres-db-volume:
